<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./worksDetail.css" />
    <link rel="stylesheet" href="./details.css" />
    <link rel="icon" type="image/png" href="./icons/cocosignIcon.png" />

    <title>mp | StockUp</title>
  </head>
  <body>
    <!-- Navbar -->
    <nav>
      <div class="left-nav">
        <span class="anim">
          <a href="./index.html"
            ><img src="./icons/cocosign.png" alt="icon"
          /></a>
        </span>
      </div>
      <div class="right-nav">
        <span class="anim"><a href="./works.html" data-i18n="works"></a></span>
        <span class="anim"><a href="./about.html" data-i18n="about"></a></span>
        <span class="anim"
          ><a href="./contact.html" data-i18n="contact"></a
        ></span>
      </div>

      <!-- Mobile menu -->
      <button class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="mobile-menu" id="mobileMenu">
        <a href="./works.html" data-i18n="works"></a>
        <a href="./about.html" data-i18n="about"></a>
        <a href="./contact.html" data-i18n="contact"></a>
      </div>
    </nav>

    <!-- Vertical text -->
    <div class="vertical anim">
      <div class="scroll-wrapper">
        <h1 data-i18n="stockupPageTitle">STOCKUP &#x2022;</h1>
      </div>
    </div>
    <section>
      <!-- Content -->
      <div class="img anim stockup">
        <img src="./images/su1.png" alt="su1" />
        <img src="./images/su2.png" alt="su2" />
        <img src="./images/su3.png" alt="su3" />
        <img src="./images/su4.png" alt="su4" />
      </div>
      <div class="anim">
        <span class="vertical-line" />
      </div>
      <div class="content anim">
        <p data-i18n="stockUpOne"></p>
        <p data-i18n="stockUpTwo"></p>
        <p data-i18n="stockUpThree"></p>
        <a
          class="link"
          target="_blank"
          href="https://github.com/martinpavlakovic/stockup"
          ><img
            src="./icons/github.png"
            alt="githubLogo"
            width="40"
            height="40" />Github repository &#8594;</a
        >
      </div>
    </section>
    <div class="lightbox" id="lightbox">
      <button class="lightbox-close" id="lightbox-close">&times;</button>
      <img id="lightbox-img" src="" alt="preview" />
    </div>
    <script src="./js/animation.js"></script>
    <script src="./js/languageSwitch.js"></script>
    <script src="./js/imagePreview.js"></script>
  </body>
</html>
