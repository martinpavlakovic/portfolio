<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="contact.css" />
    <link rel="icon" type="image/png" href="./cocosignIcon.png" />
    <title>mp | Contact</title>
  </head>
  <body>
    <nav>
      <div class="left-nav">
        <span class="anim">
          <a href="./index.html"><img src="./cocosign.png" alt="icon" /></a>
        </span>
      </div>
      <div class="right-nav">
        <div class="right-nav">
          <span class="anim"><a href="./projects.html">PROJECTS</a></span>
          <span class="anim"><a href="./about.html">ABOUT</a></span>
          <span class="anim"><a href="./contact.html">CONTACT</a></span>
        </div>
      </div>
    </nav>
    <section class="contact-container">
      <form class="contact-form anim">
        <h2 class="group anim">Get in Touch</h2>
        <div class="group anim">
          <label>Your name *</label>
          <input type="text" placeholder="Example: John Doe" class="" />
        </div>
        <div class="group anim">
          <label>Your email *</label>
          <input
            type="email"
            placeholder="Example: johndoe@gmail.com"
            class="" />
        </div>
        <div class="group anim">
          <label>Description *</label>
          <textarea
            placeholder="Example: Please specify your request."
            class=""></textarea>
        </div>
        <div class="group anim">
          <button type="submit" class="btn-gradient">Send Message</button>
        </div>
      </form>
    </section>
    <div class="vertical anim">
      <div class="scroll-wrapper">
        <h1>CONTACT &#x2022;</h1>
      </div>
    </div>
    <script src="./animation.js"></script>
  </body>
</html>
