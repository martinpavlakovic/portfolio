<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./contact.css" />
    <link rel="icon" type="image/png" href="./icons/cocosignIcon.png" />
    <title>mp | Contact</title>
  </head>
  <body>
    <!-- Navbar -->
    <nav>
      <div class="left-nav">
        <span class="anim">
          <a href="./index.html"
            ><img src="./icons/cocosign.png" alt="icon"
          /></a>
        </span>
      </div>
      <div class="right-nav">
        <span class="anim"><a href="./works.html" data-i18n="works"></a></span>
        <span class="anim"><a href="./about.html" data-i18n="about"></a></span>
        <span class="anim"
          ><a href="./contact.html" data-i18n="contact"></a
        ></span>
      </div>

      <!-- Mobile menu -->
      <button class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="mobile-menu" id="mobileMenu">
        <a href="./works.html" data-i18n="works"></a>
        <a href="./about.html" data-i18n="about"></a>
        <a href="./contact.html" data-i18n="contact"></a>
      </div>
    </nav>

    <!-- Vertical text -->
    <div class="vertical anim">
      <div class="scroll-wrapper">
        <h1 data-i18n="contactPageTitle">CONTACT &#x2022;</h1>
      </div>
    </div>

    <!-- Form -->
    <section class="contact-container">
      <form class="contact-form anim" id="contact-form">
        <h2 class="group anim" data-i18n="getInTouch"></h2>
        <div class="group anim">
          <label data-i18n="nameLabel"></label>
          <input
            name="Full Name"
            type="text"
            data-i18n-placeholder="namePlaceholder" />
        </div>
        <div class="group anim">
          <label for="email" data-i18n="emailLabel"></label>
          <input
            type="email"
            name="Email"
            id="email"
            data-i18n-placeholder="emailPlaceholder" />
        </div>
        <div class="group anim">
          <label data-i18n="descriptionLabel"></label>
          <textarea
            name="Message"
            data-i18n-placeholder="messagePlaceholder"></textarea>
        </div>
        <div class="group anim">
          <button
            type="submit"
            class="btn-gradient"
            id="submit-button"
            data-i18n="sendMessage"></button>
        </div>
      </form>
    </section>
    <script src="./js/animation.js"></script>
    <script src="./js/form.js"></script>
    <script src="./js/languageSwitch.js"></script>
  </body>
</html>
